# Development: Medusa backend + dependencies
# The web app runs locally with `pnpm dev`
#
# Usage: pnpm dev (starts everything)
#
# First run builds the Medusa image (slow). Subsequent starts are instant.
# Rebuild after changing medusa-backend/ files: pnpm dev:medusa:rebuild

services:
  postgres:
    image: postgres:15-alpine
    container_name: b42_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medusa-store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: b42_redis_dev
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  medusa:
    build:
      context: ./medusa-backend
      dockerfile: Dockerfile.dev
    container_name: b42_medusa_dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/medusa-store
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret
      COOKIE_SECRET: dev-cookie-secret
      STORE_CORS: http://localhost:5173
      ADMIN_CORS: http://localhost:5173,http://localhost:9000
      AUTH_CORS: http://localhost:5173,http://localhost:9000
      MEDUSA_BACKEND_URL: http://localhost:9000
    restart: unless-stopped

volumes:
  postgres_data_dev:
